<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Boutique Hala</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/data.js"></script>
    <script defer src="../js/admin.js"></script>
  </head>
  <body class="admin-dashboard-page">
    <header class="admin-header">
      <h1>Admin Dashboard</h1>
      <button id="logout-btn">Logout</button>
    </header>
    <main class="dashboard-container">
      <section class="admin-note">
        <h2>How to Add or Edit Abayas</h2>
        <p>
          To add, edit, or remove abayas, simply update the
          <code>data/abayas.json</code> file in your repository using the GitHub
          web interface or by pushing changes from your computer. No redeploy or
          build is needed—changes appear instantly!
        </p>
      </section>
    </main>
  </body>

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Boutique Hala</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/data-manager.js"></script>
    <style>
      .admin-dashboard-page {
        background: #f8f9fa;
        min-height: 100vh;
      }

      .admin-header {
        background: #343a40;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .admin-header h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      #logout-btn {
        background: #dc3545;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      #logout-btn:hover {
        background: #c82333;
      }

      .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      .admin-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .add-item-btn {
        background: #28a745;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
      }

      .add-item-btn:hover {
        background: #218838;
      }

      .export-btn {
        background: #17a2b8;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
      }

      .export-btn:hover {
        background: #138496;
      }

      .item-form {
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 2rem;
        margin-bottom: 2rem;
        display: none;
      }

      .item-form.active {
        display: block;
      }

      .item-form h2 {
        margin: 0 0 1.5rem 0;
        color: #333;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: #555;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .form-actions {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
      }

      .form-actions button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
      }

      .save-btn {
        background: #28a745;
        color: white;
      }

      .save-btn:hover {
        background: #218838;
      }

      .cancel-btn {
        background: #6c757d;
        color: white;
      }

      .cancel-btn:hover {
        background: #5a6268;
      }

      .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1.5rem;
      }

      .item-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: transform 0.2s;
      }

      .item-card:hover {
        transform: translateY(-2px);
      }

      .item-image {
        height: 200px;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .item-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .item-content {
        padding: 1.5rem;
      }

      .item-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin: 0 0 0.5rem 0;
        color: #333;
      }

      .item-price {
        font-size: 1.1rem;
        font-weight: 500;
        color: #28a745;
        margin: 0 0 0.5rem 0;
      }

      .item-details {
        font-size: 0.9rem;
        color: #666;
        margin: 0 0 1rem 0;
      }

      .item-actions {
        display: flex;
        gap: 0.5rem;
      }

      .edit-btn,
      .delete-btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .edit-btn {
        background: #007bff;
        color: white;
      }

      .edit-btn:hover {
        background: #0056b3;
      }

      .delete-btn {
        background: #dc3545;
        color: white;
      }

      .delete-btn:hover {
        background: #c82333;
      }

      .no-items {
        text-align: center;
        padding: 3rem;
        color: #666;
        font-size: 1.1rem;
      }

      .status-message {
        padding: 1rem;
        border-radius: 5px;
        margin-bottom: 1rem;
        text-align: center;
      }

      .status-message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status-message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      @media (max-width: 768px) {
        .dashboard-container {
          padding: 1rem;
        }

        .admin-controls {
          flex-direction: column;
          align-items: stretch;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .items-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="admin-dashboard-page">
    <header class="admin-header">
      <h1>Boutique Hala Admin Dashboard</h1>
      <button id="logout-btn">Logout</button>
    </header>

    <main class="dashboard-container">
      <!-- Status Messages -->
      <div id="status-message"></div>

      <!-- Admin Controls -->
      <div class="admin-controls">
        <button class="add-item-btn" id="add-item-btn">Add New Item</button>
        <button class="export-btn" id="export-btn">Export Data</button>
      </div>

      <!-- Add/Edit Item Form -->
      <form class="item-form" id="item-form">
        <h2 id="form-title">Add New Item</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Name (Arabic)</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="nameEn">Name (English)</label>
            <input type="text" id="nameEn" name="nameEn" required />
          </div>
          <div class="form-group">
            <label for="description">Description (Arabic)</label>
            <textarea id="description" name="description" required></textarea>
          </div>
          <div class="form-group">
            <label for="descriptionEn">Description (English)</label>
            <textarea
              id="descriptionEn"
              name="descriptionEn"
              required
            ></textarea>
          </div>
          <div class="form-group">
            <label for="price">Price (SAR)</label>
            <input
              type="number"
              id="price"
              name="price"
              min="0"
              step="0.01"
              required
            />
          </div>
          <div class="form-group">
            <label for="category">Category (Arabic)</label>
            <input type="text" id="category" name="category" required />
          </div>
          <div class="form-group">
            <label for="categoryEn">Category (English)</label>
            <input type="text" id="categoryEn" name="categoryEn" required />
          </div>
          <div class="form-group">
            <label for="sizes">Sizes (comma separated)</label>
            <input
              type="text"
              id="sizes"
              name="sizes"
              placeholder="S, M, L, XL"
              required
            />
          </div>
          <div class="form-group">
            <label for="colors">Colors (comma separated)</label>
            <input
              type="text"
              id="colors"
              name="colors"
              placeholder="Black, White, Red"
              required
            />
          </div>
          <div class="form-group">
            <label for="imageUrls">Image URLs (comma separated)</label>
            <textarea
              id="imageUrls"
              name="imageUrls"
              placeholder="https://example.com/image1.jpg, https://example.com/image2.jpg"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="videoUrls">Video URLs (comma separated)</label>
            <textarea
              id="videoUrls"
              name="videoUrls"
              placeholder="https://example.com/video1.mp4"
            ></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="cancel-btn" id="cancel-btn">
            Cancel
          </button>
          <button type="submit" class="save-btn" id="save-btn">
            Save Item
          </button>
        </div>
      </form>

      <!-- Items Grid -->
      <div id="items-grid" class="items-grid">
        <!-- Items will be rendered here -->
      </div>
    </main>

    <script>
      // Admin authentication check
      if (localStorage.getItem("boutique_admin") !== "1") {
        window.location.href = "index.html";
      }

      class AdminDashboard {
        constructor() {
          this.currentEditId = null;
          this.init();
        }

        init() {
          this.setupEventListeners();
          this.waitForDataManager();
        }

        waitForDataManager() {
          if (window.dataManager) {
            this.renderItems();
            this.setupDataListener();
          } else {
            setTimeout(() => this.waitForDataManager(), 100);
          }
        }

        setupEventListeners() {
          document
            .getElementById("add-item-btn")
            .addEventListener("click", () => {
              this.showAddForm();
            });

          document
            .getElementById("cancel-btn")
            .addEventListener("click", () => {
              this.hideForm();
            });

          document
            .getElementById("item-form")
            .addEventListener("submit", (e) => {
              e.preventDefault();
              this.saveItem();
            });

          document
            .getElementById("export-btn")
            .addEventListener("click", () => {
              this.exportData();
            });

          document
            .getElementById("logout-btn")
            .addEventListener("click", () => {
              localStorage.removeItem("boutique_admin");
              window.location.href = "index.html";
            });
        }

        setupDataListener() {
          window.addEventListener("boutiqueDataChanged", () => {
            this.renderItems();
          });
        }

        showAddForm() {
          this.currentEditId = null;
          document.getElementById("form-title").textContent = "Add New Item";
          document.getElementById("item-form").classList.add("active");
          document.getElementById("item-form").reset();
        }

        showEditForm(item) {
          this.currentEditId = item.id;
          document.getElementById("form-title").textContent = "Edit Item";
          document.getElementById("item-form").classList.add("active");

          // Populate form fields
          document.getElementById("name").value = item.name || "";
          document.getElementById("nameEn").value = item.nameEn || "";
          document.getElementById("description").value = item.description || "";
          document.getElementById("descriptionEn").value =
            item.descriptionEn || "";
          document.getElementById("price").value = item.price || "";
          document.getElementById("category").value = item.category || "";
          document.getElementById("categoryEn").value = item.categoryEn || "";
          document.getElementById("sizes").value = item.sizes
            ? item.sizes.join(", ")
            : "";
          document.getElementById("colors").value = item.colors
            ? item.colors.join(", ")
            : "";
          document.getElementById("imageUrls").value = item.imageUrls
            ? item.imageUrls.join(", ")
            : "";
          document.getElementById("videoUrls").value = item.videoUrls
            ? item.videoUrls.join(", ")
            : "";
        }

        hideForm() {
          document.getElementById("item-form").classList.remove("active");
          this.currentEditId = null;
        }

        saveItem() {
          const formData = new FormData(document.getElementById("item-form"));
          const itemData = {
            name: formData.get("name"),
            nameEn: formData.get("nameEn"),
            description: formData.get("description"),
            descriptionEn: formData.get("descriptionEn"),
            price: parseFloat(formData.get("price")),
            category: formData.get("category"),
            categoryEn: formData.get("categoryEn"),
            sizes: formData
              .get("sizes")
              .split(",")
              .map((s) => s.trim())
              .filter((s) => s),
            colors: formData
              .get("colors")
              .split(",")
              .map((c) => c.trim())
              .filter((c) => c),
            imageUrls: formData
              .get("imageUrls")
              .split(",")
              .map((url) => url.trim())
              .filter((url) => url),
            videoUrls: formData
              .get("videoUrls")
              .split(",")
              .map((url) => url.trim())
              .filter((url) => url),
          };

          try {
            if (this.currentEditId) {
              window.dataManager.updateItem(this.currentEditId, itemData);
              this.showStatus("Item updated successfully!", "success");
            } else {
              window.dataManager.addItem(itemData);
              this.showStatus("Item added successfully!", "success");
            }

            this.hideForm();
          } catch (error) {
            this.showStatus("Error saving item: " + error.message, "error");
          }
        }

        deleteItem(id) {
          if (confirm("Are you sure you want to delete this item?")) {
            try {
              window.dataManager.deleteItem(id);
              this.showStatus("Item deleted successfully!", "success");
            } catch (error) {
              this.showStatus("Error deleting item: " + error.message, "error");
            }
          }
        }

        renderItems() {
          const grid = document.getElementById("items-grid");
          const items = window.dataManager.getAllItems();

          if (items.length === 0) {
            grid.innerHTML =
              '<div class="no-items">No items found. Add your first item!</div>';
            return;
          }

          grid.innerHTML = items
            .map((item) => this.createItemCard(item))
            .join("");
        }

        createItemCard(item) {
          const imageUrl =
            item.imageUrls && item.imageUrls.length > 0
              ? item.imageUrls[0]
              : "assets/images/logo.jpg";

          return `
            <div class="item-card">
              <div class="item-image">
                <img src="${imageUrl}" alt="${
            item.name
          }" onerror="this.src='assets/images/logo.jpg'">
              </div>
              <div class="item-content">
                <h3 class="item-title">${item.name}</h3>
                <p class="item-price">${item.price} SAR</p>
                <p class="item-details">
                  <strong>Sizes:</strong> ${item.sizes.join(", ")}<br>
                  <strong>Colors:</strong> ${item.colors.join(", ")}<br>
                  <strong>Category:</strong> ${item.category}
                </p>
                <div class="item-actions">
                  <button class="edit-btn" onclick="adminDashboard.showEditForm(${JSON.stringify(
                    item
                  ).replace(/"/g, "&quot;")})">
                    Edit
                  </button>
                  <button class="delete-btn" onclick="adminDashboard.deleteItem(${
                    item.id
                  })">
                    Delete
                  </button>
                </div>
              </div>
            </div>
          `;
        }

        async exportData() {
          try {
            const success = await window.dataManager.simulateGitHubCommit();
            if (success) {
              this.showStatus("Data exported successfully!", "success");
            } else {
              this.showStatus("Failed to export data", "error");
            }
          } catch (error) {
            this.showStatus("Error exporting data: " + error.message, "error");
          }
        }

        showStatus(message, type) {
          const statusDiv = document.getElementById("status-message");
          statusDiv.textContent = message;
          statusDiv.className = `status-message ${type}`;

          setTimeout(() => {
            statusDiv.textContent = "";
            statusDiv.className = "status-message";
          }, 3000);
        }
      }

      // Initialize dashboard
      let adminDashboard;
      document.addEventListener("DOMContentLoaded", () => {
        adminDashboard = new AdminDashboard();
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="بوتيك هالة - عبايات فاخرة، معرض صور، تصفح حسب المقاس واللون. Boutique Hala - Luxury Abayas Gallery, Browse by Size and Color."
    />
    <title>بوتيك هالة | Boutique Hala</title>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/lang.js"></script>
    <script defer src="js/main.js"></script>
  </head>
  <body>
    <header class="main-header">
      <div class="logo-container">
        <img src="assets//images/logo.jpg" alt="بوتيك هالة Logo" class="logo" />
      </div>
      <div class="header-actions">
        <button id="lang-switch" aria-label="تبديل اللغة / Switch Language">
          EN
        </button>
        <a href="#" id="snapchat-link" title="Snapchat" target="_blank">
          <img src="assets/snapcode.png" alt="Snapchat" class="snapcode-icon" />
        </a>
      </div>
    </header>
    <main>
      <section class="hero">
        <h1 id="hero-title">بوتيك هالة</h1>
        <p id="hero-tagline">تألقي بعبايات فاخرة | Shine in Luxury Abayas</p>
      </section>
      <section class="filters">
        <label for="size-filter" id="size-label">المقاس:</label>
        <select id="size-filter">
          <option value="">الكل</option>
          <option value="S">صغير</option>
          <option value="M">متوسط</option>
          <option value="L">كبير</option>
          <option value="XL">كبير جدًا</option>
        </select>
        <label for="color-filter" id="color-label">اللون:</label>
        <select id="color-filter">
          <option value="">الكل</option>
          <!-- Colors will be populated dynamically -->
        </select>
      </section>
      <section id="abaya-gallery"></section>
    </main>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

      // Your Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyDXjm-OuXcva9jBznXGv9mhF3TxkHNMPG4",
        authDomain: "boutique-hala.firebaseapp.com",
        projectId: "boutique-hala",
        storageBucket: "boutique-hala.appspot.com",
        messagingSenderId: "688747116804",
        appId: "1:688747116804:web:75e997747f115e76413851",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Fetch and render abayas from Firestore
      async function renderAbayas() {
        const gallery = document.getElementById("abaya-gallery");
        gallery.innerHTML = "Loading...";
        const abayasCol = collection(db, "abayas");
        const abayasSnapshot = await getDocs(abayasCol);
        gallery.innerHTML = "";
        if (abayasSnapshot.empty) {
          gallery.innerHTML =
            "<div class='loading'>لا توجد عبايات مطابقة / No abayas found</div>";
          return;
        }
        abayasSnapshot.forEach((doc) => {
          const item = doc.data();
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <h3>${item.title}</h3>
            <p>${item.description}</p>
            <p><strong>المقاس:</strong> ${item.size.join(", ")}</p>
            <p><strong>اللون:</strong> ${item.color}</p>
            <div>${item.images
              .map((img) => `<img src="${img}" width="100">`)
              .join("")}</div>
          `;
          gallery.appendChild(card);
        });
      }

      // Call on page load
      renderAbayas();
    </script>
  </body>
</html>
